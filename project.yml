name: OnTop
options:
  bundleIdPrefix: com.tejalgoyal
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  OnTop:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OnTop
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tejalgoyal.ontop
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: OnTop/OnTop.entitlements
        INFOPLIST_FILE: OnTop/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    dependencies:
      - package: KeyboardShortcuts
    entitlements:
      path: OnTop/OnTop.entitlements
